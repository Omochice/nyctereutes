name: fix-vendor-hash

on:
  push:
    branches:
      - renovate/**

permissions: {}

concurrency:
  group: fix-vendor-hash-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Refresh vendorHash from the updated go.mod
        run: nix develop --command nix-update --flake --version=skip default
      - name: Push the refreshed hash back to the Renovate branch
        # The default GITHUB_TOKEN would not trigger the check workflow on the
        # pushed commit, leaving the PR without a status for its new head, so
        # the push authenticates with a PAT instead.
        env:
          PUSH_TOKEN: ${{ secrets.VENDOR_HASH_PUSH_TOKEN }}
        run: |
          if git diff --quiet flake.nix; then
            echo "vendorHash is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit \
            -m "build: update vendorHash for renovated Go dependencies" \
            -m "buildGoModule pins the vendored modules by hash, so the go.mod update on this branch invalidates the previous value."
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
