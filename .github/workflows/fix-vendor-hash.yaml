name: fix-vendor-hash

on:
  push:
    branches:
      - renovate/**

permissions: {}

concurrency:
  group: fix-vendor-hash-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    # An on.push.paths filter would miss Renovate's rebase force-pushes: their
    # before..after diff only holds what main changed in between, not the
    # branch's own go.mod update, so the change is detected against main here
    # instead. Gating on the pusher also keeps the workflow from re-running on
    # the hash-fix commit the fix job itself pushes. The sender is matched by
    # renovate[bot]'s numeric user ID, which unlike a login cannot be spoofed
    # by a look-alike account name.
    if: github.event.sender.id == 29139614
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      go-deps-changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Compare go.mod and go.sum against main
        id: diff
        run: |
          if git diff --quiet origin/main...HEAD -- go.mod go.sum; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
  fix:
    needs:
      - detect
    if: needs.detect.outputs.go-deps-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Refresh vendorHash from the updated go.mod
        run: nix develop --command nix-update --flake --version=skip default
      # The default GITHUB_TOKEN would not trigger the check workflow on the
      # pushed commit, leaving the PR without a status for its new head, so
      # the push authenticates as a GitHub App instead.
      - name: Generate an app token for the push
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
      - name: Push the refreshed hash back to the Renovate branch
        env:
          PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet flake.nix; then
            echo "vendorHash is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit \
            -m "build: update vendorHash for renovated Go dependencies" \
            -m "buildGoModule pins the vendored modules by hash, so the go.mod update on this branch invalidates the previous value."
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
