coverage:
  paths:
    - coverage.out

codeToTestRatio:
  code:
    - "**/*.go"
    - "!**/*_test.go"
  test:
    - "**/*_test.go"

testExecutionTime:
  steps:
    - Run tests with coverage

diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}

report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}

comment:
  if: is_pull_request
